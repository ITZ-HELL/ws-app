<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Whiskars</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0B0E14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding: 20px;
        }
        /* ПАНЕЛЬ НАВИГАЦИИ */
        .nav {
            width: 390px;
            max-width: 100%;
            height: 70px;
            background: rgba(18, 22, 34, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px 20px;
            transition: 0.2s;
            position: relative;
        }
        .nav-item .icon {
            font-size: 28px;
            line-height: 1;
            transition: 0.2s;
        }
        .nav-item .label {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: 0.2s;
        }
        /* Активная вкладка (золотая) */
        .nav-item.active .icon,
        .nav-item.active .label {
            color: #FBBF24;
        }
        .nav-item.active .label {
            font-weight: 700;
        }
        /* Неактивная вкладка (серая) */
        .nav-item:not(.active) .icon,
        .nav-item:not(.active) .label {
            color: #9CA3AF;
        }
        /* Лёгкое свечение у активной */
        .nav-item.active::after {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 3px;
            background: #FBBF24;
            border-radius: 10px;
            box-shadow: 0 0 15px #FBBF24;
        }
        /* Ховер для всех */
        .nav-item:hover .icon,
        .nav-item:hover .label {
            color: #FBBF24;
        }
    </style>
</head>
<body>

    <!-- ПАНЕЛЬ НАВИГАЦИИ -->
    <div class="nav">
        <!-- Главная (неактивная) -->
        <button class="nav-item">
            <span class="icon">🏠</span>
            <span class="label">Главная</span>
        </button>

        <!-- Профиль (активная — золотая) -->
        <button class="nav-item active">
            <span class="icon">👤</span>
            <span class="label">Профиль</span>
        </button>
    </div>

</body>
</html>
