<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Whiskars</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0B0E14;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app {
            max-width: 400px;
            width: 100%;
            background-image: url('https://i.postimg.cc/7hNFQkQ7/Bez-nazvania53-20260711220851.png');
            background-size: cover;
            background-position: center;
            border-radius: 32px;
            padding: 24px 18px 100px;
            position: relative;
            min-height: 500px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }
        .app::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 14, 20, 0.6);
            border-radius: 32px;
            z-index: 0;
        }
        .content, .nav {
            position: relative;
            z-index: 1;
        }

        .content {
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .page.active {
            display: flex;
        }
        .page h2 {
            color: #fff;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .page p {
            color: #9CA3AF;
            font-size: 16px;
            text-align: center;
        }

        /* НАВИГАЦИЯ ВНИЗУ */
        .nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: 0;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .nav-item {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            border: none;
            padding: 0;
            cursor: pointer;
            transition: 0.15s;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .nav-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: 0.15s;
            pointer-events: none;
        }
        .nav-item:active {
            transform: scale(0.96);
        }
        /* ЖИДКОЕ СТЕКЛО */
        .nav-item.liquid {
            animation: liquidGlass 0.5s ease-out;
        }
        @keyframes liquidGlass {
            0% {
                filter: brightness(1);
            }
            20% {
                filter: brightness(1.5) drop-shadow(0 0 20px rgba(251, 191, 36, 0.5));
            }
            60% {
                filter: brightness(0.9) drop-shadow(0 0 40px rgba(251, 191, 36, 0.2));
            }
            100% {
                filter: brightness(1) drop-shadow(0 0 0 rgba(251, 191, 36, 0));
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="content">
            <!-- Главная -->
            <div id="page-main" class="page active">
                <h2>🏠 Главная</h2>
                <p>Контент главной страницы</p>
            </div>

            <!-- Профиль -->
            <div id="page-profile" class="page">
                <h2>👤 Профиль</h2>
                <p>Контент профиля</p>
            </div>
        </div>

        <!-- НАВИГАЦИЯ (две кнопки с твоими иконками) -->
        <div class="nav">
            <button class="nav-item" id="nav-main">
                <img src="https://i.postimg.cc/WbPj607K/Bez-nazvania55-20260712021411.png" alt="Главная">
            </button>
            <button class="nav-item" id="nav-profile">
                <img src="https://i.postimg.cc/bvFpQM69/Bez-nazvania55-20260712015252.png" alt="Профиль">
            </button>
        </div>
    </div>

    <script>
        const navMain = document.getElementById('nav-main');
        const navProfile = document.getElementById('nav-profile');
        const pageMain = document.getElementById('page-main');
        const pageProfile = document.getElementById('page-profile');

        // Функция переключения с эффектом
        function switchToMain() {
            pageMain.classList.add('active');
            pageProfile.classList.remove('active');
            // Анимация на кнопке
            navMain.classList.remove('liquid');
            void navMain.offsetWidth;
            navMain.classList.add('liquid');
        }

        function switchToProfile() {
            pageProfile.classList.add('active');
            pageMain.classList.remove('active');
            navProfile.classList.remove('liquid');
            void navProfile.offsetWidth;
            navProfile.classList.add('liquid');
        }

        navMain.addEventListener('click', switchToMain);
        navProfile.addEventListener('click', switchToProfile);
    </script>
</body>
</html>
