<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>App</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0B0E14;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .app {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background-image: url('https://i.postimg.cc/CLtRpSWb/Bez-nazvania53-20260711220711.png');
    background-size: cover;
    background-position: center;
  }
  .app::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(11, 14, 20, 0.5);
    z-index: 0;
  }
  .app > * {
    position: relative;
    z-index: 1;
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 20px;
    text-align: center;
  }
  .content h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .content h1 span {
    color: #FFD24C;
  }
  .content p {
    color: #9CA3AF;
    font-size: 16px;
    max-width: 280px;
  }

  .nav-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 16px 16px 24px;
    width: 100%;
  }
  .nav-btn {
    position: relative;
    width: 92px;
    height: 92px;
    border: none;
    background: transparent;
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    padding: 0;
    overflow: hidden;
    transition: none;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
    border-radius: 50%;
  }
</style>
</head>
<body>
  <div class="app">
    <div class="content">
      <h1>🏠 <span>Главная</span></h1>
      <p>Контент главной страницы</p>
    </div>

    <div class="nav-row">
      <button class="nav-btn" data-page="home">
        <img src="https://i.postimg.cc/WbPj607K/Bez-nazvania55-20260712021411.png" alt="Главная">
      </button>
      <button class="nav-btn" data-page="profile">
        <img src="https://i.postimg.cc/bvFpQM69/Bez-nazvania55-20260712015252.png" alt="Профиль">
      </button>
    </div>
  </div>

  <script>
    (function() {
      var buttons = document.querySelectorAll('.nav-btn');
      var current = 'home';
      var homeImg = buttons[0].querySelector('img');
      var profileImg = buttons[1].querySelector('img');

      var homeActive = 'https://i.postimg.cc/WbPj607K/Bez-nazvania55-20260712021411.png';
      var profileActive = 'https://i.postimg.cc/bvFpQM69/Bez-nazvania55-20260712015252.png';

      // Для простоты пока оставляем те же картинки, можно добавить неактивные позже

      buttons.forEach(function(btn) {
        btn.addEventListener('click', function() {
          var target = btn.dataset.page;
          if (target === current) return;
          current = target;
          console.log('переключились на:', target);
          // Здесь будет логика смены страницы
        });
      });
    })();
  </script>
</body>
</html>
