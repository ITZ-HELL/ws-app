<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>App</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0B0E14;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .app {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background-image: url('https://i.postimg.cc/CLtRpSWb/Bez-nazvania53-20260711220711.png');
    background-size: cover;
    background-position: center;
  }
  .app::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(11, 14, 20, 0.5);
    z-index: 0;
  }
  .app > * {
    position: relative;
    z-index: 1;
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 20px;
    text-align: center;
  }
  .content h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .content h1 span {
    color: #FFD24C;
  }
  .content p {
    color: #9CA3AF;
    font-size: 16px;
    max-width: 280px;
  }

  /* ===== ВИДЖЕТ С ЖИДКИМ СТЕКЛОМ ===== */
  .widget-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 4px 20px 8px;
    width: 100%;
  }
  .widget-panel {
    width: 100%;
    max-width: 360px;
    height: 60px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 0 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
  }
  .nav-btn {
    background: none;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 14px;
    flex: 1;
    font-family: inherit;
    text-align: center;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    transition: 0.2s;
  }
  .nav-btn .label {
    font-size: 14px;
    font-weight: 500;
    color: #6B7280;
    transition: 0.2s;
    letter-spacing: 0.5px;
  }
  .nav-btn.active .label {
    color: #FFD24C;
    font-weight: 600;
  }

  /* Эффект жидкого стекла (волна) */
  .ripple {
    position: absolute;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,215,0,0.1) 60%, transparent 100%);
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    pointer-events: none;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
    animation: rippleAnim 0.6s ease-out forwards;
  }
  @keyframes rippleAnim {
    0% {
      transform: translate(-50%, -50%) scale(0);
      opacity: 0.8;
    }
    100% {
      transform: translate(-50%, -50%) scale(6);
      opacity: 0;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="content" id="pageContent">
      <h1>🏠 <span id="pageTitle">Главная</span></h1>
      <p id="pageDesc">Контент главной страницы</p>
    </div>

    <div class="widget-wrapper">
      <div class="widget-panel" id="widgetPanel">
        <button class="nav-btn active" data-page="home">
          <span class="label">Главная</span>
        </button>
        <button class="nav-btn" data-page="profile">
          <span class="label">Профиль</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const panel = document.getElementById('widgetPanel');
      const buttons = panel.querySelectorAll('.nav-btn');
      const pageTitle = document.getElementById('pageTitle');
      const pageDesc = document.getElementById('pageDesc');

      let current = 'home';

      buttons.forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          // Эффект жидкого стекла
          const rect = btn.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;

          const ripple = document.createElement('span');
          ripple.className = 'ripple';
          ripple.style.left = x + 'px';
          ripple.style.top = y + 'px';
          btn.appendChild(ripple);

          // Удаляем элемент после анимации
          setTimeout(() => ripple.remove(), 600);

          // Переключение страницы
          const target = btn.dataset.page;
          if (target === current) return;

          buttons.forEach(function(b) {
            b.classList.toggle('active', b.dataset.page === target);
          });

          current = target;

          if (target === 'home') {
            pageTitle.textContent = 'Главная';
            pageDesc.textContent = 'Контент главной страницы';
          } else {
            pageTitle.textContent = 'Профиль';
            pageDesc.textContent = 'Информация о пользователе';
          }
        });
      });
    })();
  </script>
</body>
</html>
