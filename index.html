<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Whiskars</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0B0E14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app {
            max-width: 400px;
            width: 100%;
            background-image: url('https://i.postimg.cc/7hNFQkQ7/Bez-nazvania53-20260711220851.png');
            background-size: cover;
            background-position: center;
            border-radius: 32px;
            padding: 24px 18px 100px;
            position: relative;
            min-height: 700px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }
        .app::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 14, 20, 0.6);
            border-radius: 32px;
            z-index: 0;
        }
        .header, .content, .nav {
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0 18px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .logo {
            font-family: 'Exo 2', sans-serif;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 1px;
            color: #fff;
            text-transform: uppercase;
        }
        .logo span {
            color: #FBBF24;
        }
        .balance-block {
            background: rgba(251, 191, 36, 0.12);
            border: 1px solid rgba(251, 191, 36, 0.25);
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            color: #FBBF24;
            font-family: 'Exo 2', sans-serif;
        }

        .content {
            margin-top: 24px;
            min-height: 300px;
        }
        .page {
            display: none;
            flex-direction: column;
            gap: 14px;
        }
        .page.active {
            display: flex;
        }
        .page h2 {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-top: 40px;
        }
        .page p {
            color: #9CA3AF;
            text-align: center;
        }

        .case {
            background: rgba(18, 22, 34, 0.7);
            backdrop-filter: blur(6px);
            border-radius: 20px;
            padding: 16px 18px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .case-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .case-icon {
            width: 50px;
            height: 50px;
            background: rgba(251, 191, 36, 0.08);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }
        .case-info .title {
            color: #fff;
            font-weight: 600;
            font-size: 16px;
        }
        .case-info .desc {
            color: #9CA3AF;
            font-size: 13px;
            margin-top: 2px;
        }
        .case-right {
            text-align: right;
        }
        .case-price {
            color: #FBBF24;
            font-weight: 700;
            font-size: 18px;
            font-family: 'Exo 2', sans-serif;
        }
        .btn-buy {
            margin-top: 6px;
            background: #FBBF24;
            border: none;
            padding: 5px 18px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            color: #0B0E14;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-buy:hover {
            background: #F59E0B;
        }

        /* НАВИГАЦИЯ С ЭФФЕКТОМ ЖИДКОГО СТЕКЛА */
        .nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            z-index: 10;
            display: flex;
            justify-content: center;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }
        .nav img {
            width: 100%;
            height: auto;
            display: block;
            transition: 0.2s;
        }
        /* Эффект жидкого стекла */
        .nav.liquid {
            animation: liquidGlass 0.5s ease-out;
        }
        @keyframes liquidGlass {
            0% {
                box-shadow: 0 0 0 0 rgba(251, 191, 36, 0),
                            0 4px 30px rgba(0, 0, 0, 0.5);
                transform: translateX(-50%) scale(1);
                filter: brightness(1);
            }
            20% {
                box-shadow: 0 0 30px 15px rgba(251, 191, 36, 0.4),
                            0 4px 30px rgba(0, 0, 0, 0.5);
                transform: translateX(-50%) scale(1.02);
                filter: brightness(1.3);
            }
            60% {
                box-shadow: 0 0 60px 25px rgba(251, 191, 36, 0.2),
                            0 4px 30px rgba(0, 0, 0, 0.5);
                transform: translateX(-50%) scale(0.98);
                filter: brightness(0.9);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(251, 191, 36, 0),
                            0 4px 30px rgba(0, 0, 0, 0.5);
                transform: translateX(-50%) scale(1);
                filter: brightness(1);
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">🎰 <span>WHISKARS</span></div>
            <div class="balance-block">💰 0 ₽</div>
        </div>

        <div class="content">
            <div id="page-main" class="page active">
                <div class="case">
                    <div class="case-left">
                        <div class="case-icon">🔮</div>
                        <div class="case-info">
                            <div class="title">Секретный</div>
                            <div class="desc">Неизвестно, что внутри</div>
                        </div>
                    </div>
                    <div class="case-right">
                        <div class="case-price">500 ₽</div>
                        <button class="btn-buy">Купить</button>
                    </div>
                </div>
                <div class="case">
                    <div class="case-left">
                        <div class="case-icon">💎</div>
                        <div class="case-info">
                            <div class="title">Синий контейнер</div>
                            <div class="desc">Из самой Америки</div>
                        </div>
                    </div>
                    <div class="case-right">
                        <div class="case-price">300 ₽</div>
                        <button class="btn-buy">Купить</button>
                    </div>
                </div>
                <div class="case">
                    <div class="case-left">
                        <div class="case-icon">👑</div>
                        <div class="case-info">
                            <div class="title">Золотой контейнер</div>
                            <div class="desc">Реликвия древних</div>
                        </div>
                    </div>
                    <div class="case-right">
                        <div class="case-price">1 500 ₽</div>
                        <button class="btn-buy">Купить</button>
                    </div>
                </div>
            </div>

            <div id="page-profile" class="page">
                <h2>👤 Профиль</h2>
                <p>Здесь будет информация о пользователе</p>
            </div>
        </div>

        <div class="nav" id="navBar">
            <img id="navImage" src="https://i.postimg.cc/WbPj607K/Bez-nazvania55-20260712021411.png" alt="Навигация">
        </div>
    </div>

    <script>
        const navBar = document.getElementById('navBar');
        const navImage = document.getElementById('navImage');
        const pageMain = document.getElementById('page-main');
        const pageProfile = document.getElementById('page-profile');
        let isMain = true;

        navBar.addEventListener('click', function() {
            // Эффект жидкого стекла
            navBar.classList.remove('liquid');
            void navBar.offsetWidth; // перезапуск анимации
            navBar.classList.add('liquid');

            if (isMain) {
                pageMain.classList.remove('active');
                pageProfile.classList.add('active');
                navImage.src = 'https://i.postimg.cc/bvFpQM69/Bez-nazvania55-20260712015252.png';
                isMain = false;
            } else {
                pageProfile.classList.remove('active');
                pageMain.classList.add('active');
                navImage.src = 'https://i.postimg.cc/WbPj607K/Bez-nazvania55-20260712021411.png';
                isMain = true;
            }
        });
    </script>
</body>
</html>
