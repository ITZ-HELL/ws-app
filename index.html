<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>App</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0B0E14;
  }
  .app {
    width: 100%;
    height: 100%;
    background-image: url('https://i.postimg.cc/CLtRpSWb/Bez-nazvania53-20260711220711.png');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .app::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(11, 14, 20, 0.5);
    z-index: 0;
  }
  .widgets {
    position: relative;
    z-index: 1;
    display: flex;
    width: 100%;
    height: 100%;
  }
  .widget-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    cursor: pointer;
    padding: 10px;
    transition: none;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  .widget-btn img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
    max-width: 100%;
    max-height: 100%;
  }
  /* Активный виджет — можно подсветить, если нужно */
  .widget-btn.active {
    filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.2));
  }
</style>
</head>
<body>
  <div class="app">
    <div class="widgets">
      <button class="widget-btn active" id="btn-home">
        <img src="https://i.postimg.cc/WbPj607K/Bez-nazvania55-20260712021411.png" alt="Главная">
      </button>
      <button class="widget-btn" id="btn-profile">
        <img src="https://i.postimg.cc/bvFpQM69/Bez-nazvania55-20260712015252.png" alt="Профиль">
      </button>
    </div>
  </div>

  <script>
    (function() {
      const homeBtn = document.getElementById('btn-home');
      const profileBtn = document.getElementById('btn-profile');
      const homeImg = homeBtn.querySelector('img');
      const profileImg = profileBtn.querySelector('img');

      // Ссылки на картинки (активные — жёлтые)
      const homeActive = 'https://i.postimg.cc/WbPj607K/Bez-nazvania55-20260712021411.png';
      const profileActive = 'https://i.postimg.cc/bvFpQM69/Bez-nazvania55-20260712015252.png';

      // Здесь можно добавить ссылки на неактивные (серые), если есть
      // Пока просто оставляем те же, но можно поменять позже

      function setActive(activeBtn) {
        // Убираем активный класс у всех
        homeBtn.classList.remove('active');
        profileBtn.classList.remove('active');
        activeBtn.classList.add('active');
      }

      homeBtn.addEventListener('click', function() {
        setActive(homeBtn);
        // Здесь можно добавить логику переключения страницы, если нужно
      });

      profileBtn.addEventListener('click', function() {
        setActive(profileBtn);
        // Здесь можно добавить логику переключения страницы, если нужно
      });
    })();
  </script>
</body>
</html>
