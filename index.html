<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0B0E14;
  }
  .app {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('https://i.postimg.cc/CLtRpSWb/Bez-nazvania53-20260711220711.png');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .app::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(11, 14, 20, 0.4);
    z-index: 0;
  }
  .app > * {
    position: relative;
    z-index: 1;
  }

  /* ===== ШАПКА (только для главной) ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 8px;
    gap: 8px;
  }
  .header.hidden {
    display: none;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar-wrapper {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #0B0E14;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.06);
  }
  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    background: #6C6C6C;
    text-transform: uppercase;
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .topup-btn {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #0B0E14;
    background: #FFD24C;
    padding: 6px 16px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.2s;
    white-space: nowrap;
    box-shadow: 0 0 20px rgba(255, 210, 76, 0.15);
  }
  .topup-btn:hover {
    background: #F5C53B;
    transform: scale(1.02);
  }

  /* ===== БАЛАНС (общий) ===== */
  .balance-block {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 16px;
    padding: 6px 14px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 40px;
    max-width: 200px;
    transition: all 0.2s ease;
  }
  .balance {
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .balance .currency {
    font-family: 'Montserrat', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #FFFFFF;
    margin-left: 2px;
    opacity: 0.8;
  }

  /* ===== СТРАНИЦЫ ===== */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
  }
  .page {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }
  .page.active {
    display: flex;
  }
  .page .sub {
    font-size: 14px;
    color: #9CA3AF;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* ===== ПРОФИЛЬ ===== */
  .profile-container {
    position: absolute;
    top: 20px;
    left: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 5;
  }
  .profile-avatar-wrapper {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #0B0E14;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.06);
  }
  .profile-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 600;
    color: #fff;
    background: #6C6C6C;
    text-transform: uppercase;
  }
  .profile-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .profile-info {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }
  .profile-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.2;
  }
  .profile-username {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #9CA3AF;
  }
  .profile-id {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: #6B7280;
    letter-spacing: 0.5px;
  }

  /* ===== НАВИГАЦИЯ ===== */
  .widget-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 4px 20px 8px;
    width: 100%;
  }
  .widget-panel {
    width: 100%;
    max-width: 360px;
    height: 70px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(10px) saturate(180%);
    -webkit-backdrop-filter: blur(10px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 0 12px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.2);
  }
  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    background: none;
    border: none;
    padding: 4px 12px;
    cursor: pointer;
    border-radius: 14px;
    flex: 1;
    font-family: inherit;
    transition: 0.2s;
  }
  .nav-btn svg {
    width: 24px;
    height: 24px;
    stroke: #9CA3AF;
    stroke-width: 1.8;
    fill: none;
    transition: 0.2s;
  }
  .nav-btn .label {
    font-size: 11px;
    font-weight: 500;
    color: #9CA3AF;
    transition: 0.2s;
    letter-spacing: 0.3px;
  }
  .nav-btn.active svg {
    stroke: #FFD24C;
  }
  .nav-btn.active .label {
    color: #FFD24C;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="app">
    <!-- ШАПКА (только для главной) -->
    <div class="header" id="mainHeader">
      <div class="header-left">
        <div class="avatar-wrapper">
          <div class="avatar" id="avatar"></div>
        </div>
        <button class="topup-btn" id="topupBtn">Пополнить</button>
      </div>
      <div class="balance-block">
        <div class="balance" id="balance">0 <span class="currency">₽</span></div>
      </div>
    </div>

    <!-- СТРАНИЦЫ -->
    <div class="content">
      <!-- Главная -->
      <div id="page-home" class="page active">
        <div class="sub">главная</div>
      </div>

      <!-- Профиль -->
      <div id="page-profile" class="page">
        <div class="profile-container">
          <div class="profile-avatar-wrapper">
            <div class="profile-avatar" id="profileAvatar"></div>
          </div>
          <div class="profile-info">
            <div class="profile-name" id="profileName">Имя</div>
            <div class="profile-username" id="profileUsername">@username</div>
            <div class="profile-id" id="profileId">ID: 0</div>
          </div>
        </div>
      </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="widget-wrapper">
      <div class="widget-panel" id="widgetPanel">
        <button class="nav-btn active" data-page="home">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
            <path d="M3 12l9-9 9 9" />
            <path d="M5 10v9a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1v-9" />
          </svg>
          <span class="label">Главная</span>
        </button>
        <button class="nav-btn" data-page="profile">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.5-6 8-6s8 2 8 6" />
          </svg>
          <span class="label">Профиль</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.expand();
      }

      const avatarEl = document.getElementById('avatar');
      const profileAvatarEl = document.getElementById('profileAvatar');
      const profileNameEl = document.getElementById('profileName');
      const profileUsernameEl = document.getElementById('profileUsername');
      const profileIdEl = document.getElementById('profileId');

      const colors = ['#FF6B6B', '#FF9F43', '#FECA57', '#48DBFB', '#0ABDE3', '#10AC84', '#EE5A24', '#5F27CD'];

      function getColorFromId(id) {
        if (!id) return colors[0];
        const index = id % colors.length;
        return colors[index];
      }

      function setAvatar(container, user) {
        const name = user.first_name || 'User';
        const firstLetter = name.charAt(0).toUpperCase();
        if (user.photo_url) {
          container.innerHTML = `<img src="${user.photo_url}" alt="Аватар">`;
        } else {
          const bgColor = getColorFromId(user.id);
          container.style.background = bgColor;
          container.textContent = firstLetter;
        }
      }

      if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
        const user = window.Telegram.WebApp.initDataUnsafe.user;
        setAvatar(avatarEl, user);
        setAvatar(profileAvatarEl, user);
        profileNameEl.textContent = user.first_name || 'User';
        profileUsernameEl.textContent = user.username ? '@' + user.username : 'нет юзернейма';
        profileIdEl.textContent = 'ID: ' + user.id;
      } else {
        avatarEl.style.background = '#6C6C6C';
        avatarEl.textContent = '👤';
        profileAvatarEl.style.background = '#6C6C6C';
        profileAvatarEl.textContent = '👤';
        profileNameEl.textContent = 'Гость';
        profileUsernameEl.textContent = 'не авторизован';
        profileIdEl.textContent = 'ID: 0';
      }

      // Переключение вкладок
      const panel = document.getElementById('widgetPanel');
      const buttons = panel.querySelectorAll('.nav-btn');
      const pageHome = document.getElementById('page-home');
      const pageProfile = document.getElementById('page-profile');
      const mainHeader = document.getElementById('mainHeader');

      let current = 'home';

      buttons.forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const target = btn.dataset.page;
          if (target === current) return;

          buttons.forEach(function(b) {
            b.classList.toggle('active', b.dataset.page === target);
          });

          current = target;

          if (target === 'home') {
            pageHome.classList.add('active');
            pageProfile.classList.remove('active');
            mainHeader.classList.remove('hidden');
          } else {
            pageProfile.classList.add('active');
            pageHome.classList.remove('active');
            mainHeader.classList.add('hidden');
          }
        });
      });

      document.getElementById('topupBtn').addEventListener('click', function() {
        console.log('Пополнение');
      });
    })();
  </script>
</body>
</html>
