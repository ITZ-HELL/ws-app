<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0B0E14;
  }
  .app {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('https://i.postimg.cc/CLtRpSWb/Bez-nazvania53-20260711220711.png');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
  }
  .app::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(11, 14, 20, 0.4);
    z-index: 0;
  }
  .app > * {
    position: relative;
    z-index: 1;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 8px;
    gap: 12px;
  }
  .avatar-wrapper {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #0B0E14;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.06);
  }
  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    background: #6C6C6C;
    text-transform: uppercase;
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* БАЛАНС — прозрачный размытый блок */
  .balance-block {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 16px;
    padding: 6px 14px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .balance {
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .balance .currency {
    font-family: 'Montserrat', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #FFFFFF;
    margin-left: 2px;
    opacity: 0.8;
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
  }
  .content .sub {
    font-size: 14px;
    color: #9CA3AF;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .widget-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 4px 20px 8px;
    width: 100%;
  }
  .widget-panel {
    width: 100%;
    max-width: 360px;
    height: 70px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(10px) saturate(180%);
    -webkit-backdrop-filter: blur(10px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 0 12px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.2);
  }
  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    background: none;
    border: none;
    padding: 4px 12px;
    cursor: pointer;
    border-radius: 14px;
    flex: 1;
    font-family: inherit;
    transition: 0.2s;
  }
  .nav-btn svg {
    width: 24px;
    height: 24px;
    stroke: #9CA3AF;
    stroke-width: 1.8;
    fill: none;
    transition: 0.2s;
  }
  .nav-btn .label {
    font-size: 11px;
    font-weight: 500;
    color: #9CA3AF;
    transition: 0.2s;
    letter-spacing: 0.3px;
  }
  .nav-btn.active svg {
    stroke: #FFD24C;
  }
  .nav-btn.active .label {
    color: #FFD24C;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="avatar-wrapper">
        <div class="avatar" id="avatar"></div>
      </div>
      <div class="balance-block">
        <div class="balance" id="balance">0 <span class="currency">₽</span></div>
      </div>
    </div>

    <div class="content" id="pageContent">
      <div class="sub" id="pageDesc">главная</div>
    </div>

    <div class="widget-wrapper">
      <div class="widget-panel" id="widgetPanel">
        <button class="nav-btn active" data-page="home">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
            <path d="M3 12l9-9 9 9" />
            <path d="M5 10v9a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1v-9" />
          </svg>
          <span class="label">Главная</span>
        </button>
        <button class="nav-btn" data-page="profile">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.5-6 8-6s8 2 8 6" />
          </svg>
          <span class="label">Профиль</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.expand();
        console.log('Telegram Web App готов');
      } else {
        console.log('Не в Telegram Web App');
      }

      const avatarEl = document.getElementById('avatar');
      const colors = ['#FF6B6B', '#FF9F43', '#FECA57', '#48DBFB', '#0ABDE3', '#10AC84', '#EE5A24', '#5F27CD'];

      function getColorFromId(id) {
        if (!id) return colors[0];
        const index = id % colors.length;
        return colors[index];
      }

      if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
        const user = window.Telegram.WebApp.initDataUnsafe.user;
        const name = user.first_name || 'User';
        const firstLetter = name.charAt(0).toUpperCase();

        if (user.photo_url) {
          avatarEl.innerHTML = `<img src="${user.photo_url}" alt="Аватар">`;
        } else {
          const bgColor = getColorFromId(user.id);
          avatarEl.style.background = bgColor;
          avatarEl.textContent = firstLetter;
        }
      } else {
        avatarEl.style.background = '#6C6C6C';
        avatarEl.textContent = '👤';
      }

      const panel = document.getElementById('widgetPanel');
      const buttons = panel.querySelectorAll('.nav-btn');
      const pageDesc = document.getElementById('pageDesc');

      let current = 'home';

      buttons.forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const target = btn.dataset.page;
          if (target === current) return;

          buttons.forEach(function(b) {
            b.classList.toggle('active', b.dataset.page === target);
          });

          current = target;

          if (target === 'home') {
            pageDesc.textContent = 'главная';
          } else {
            pageDesc.textContent = 'профиль';
          }
        });
      });
    })();
  </script>
</body>
</html>
