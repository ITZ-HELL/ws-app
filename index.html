<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Whiskars</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            background: #0B0E14;
            padding: 16px;
        }

        .app {
            max-width: 400px;
            width: 100%;
            min-height: 600px;
            border-radius: 32px;
            padding: 24px 18px 90px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: url('https://i.postimg.cc/7hNFQkQ7/Bez-nazvania53-20260711220851.png');
            background-size: cover;
            background-position: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }

        .app::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(11, 14, 20, 0.6);
            border-radius: 32px;
            z-index: 0;
        }

        .content, .nav {
            position: relative;
            z-index: 1;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            width: 100%;
            text-align: center;
        }

        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .page.active {
            display: flex;
        }

        .page h2 {
            color: #fff;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .page p {
            color: #9CA3AF;
            font-size: 16px;
        }

        /* ===== НАВИГАЦИЯ ===== */
        .nav {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            touch-action: none;
            cursor: pointer;
        }

        .nav img {
            width: 100%;
            display: block;
            pointer-events: none;
        }

        /* ===== ЖИДКОЕ СТЕКЛО ===== */
        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            pointer-events: none;
            background: linear-gradient(
                145deg,
                rgba(255, 255, 255, 0.35) 0%,
                rgba(255, 210, 76, 0.18) 45%,
                rgba(255, 255, 255, 0.05) 100%
            );
            backdrop-filter: blur(4px) saturate(180%);
            -webkit-backdrop-filter: blur(4px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.55);
            box-shadow:
                inset 0 0 10px rgba(255, 255, 255, 0.5),
                inset 0 -6px 12px rgba(255, 190, 40, 0.25),
                0 0 24px rgba(255, 210, 76, 0.35);
            z-index: 10;
        }

        .ripple.animate {
            animation: liquidWave 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes liquidWave {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            12% {
                opacity: 1;
            }
            55% {
                opacity: 0.85;
            }
            100% {
                transform: translate(-50%, -50%) scale(13);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="content">
            <div id="page-main" class="page active">
                <h2>🏠 Главная</h2>
                <p>Контент главной страницы</p>
            </div>
            <div id="page-profile" class="page">
                <h2>👤 Профиль</h2>
                <p>Контент профиля</p>
            </div>
        </div>

        <div class="nav" id="navSwitch">
            <img id="navImage" src="https://i.postimg.cc/WbPj607K/Bez-nazvania55-20260712021411.png" alt="Переключить">
        </div>
    </div>

    <script>
        const nav = document.getElementById('navSwitch');
        const navImage = document.getElementById('navImage');
        const mainPage = document.getElementById('page-main');
        const profilePage = document.getElementById('page-profile');

        let isMain = true;
        let startX = 0;
        let isDragging = false;

        function switchPage() {
            // Создаём эффект жидкого стекла
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            nav.appendChild(ripple);

            // Запускаем анимацию
            requestAnimationFrame(() => {
                ripple.classList.add('animate');
            });

            // Удаляем после анимации
            ripple.addEventListener('animationend', () => {
                ripple.remove();
            });

            // Переключаем страницы и иконку
            if (isMain) {
                mainPage.classList.remove('active');
                profilePage.classList.add('active');
                navImage.src = 'https://i.postimg.cc/bvFpQM69/Bez-nazvania55-20260712015252.png';
                isMain = false;
            } else {
                profilePage.classList.remove('active');
                mainPage.classList.add('active');
                navImage.src = 'https://i.postimg.cc/WbPj607K/Bez-nazvania55-20260712021411.png';
                isMain = true;
            }
        }

        // Клик
        nav.addEventListener('click', switchPage);

        // Свайп
        nav.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            isDragging = true;
        });

        nav.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const delta = e.touches[0].clientX - startX;
            if (Math.abs(delta) > 40) {
                if (delta > 0 && !isMain) switchPage();
                else if (delta < 0 && isMain) switchPage();
                isDragging = false;
            }
        });

        nav.addEventListener('touchend', () => {
            isDragging = false;
        });
    </script>
</body>
</html>
