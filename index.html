<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>App</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0B0E14;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .app {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background-image: url('https://i.postimg.cc/CLtRpSWb/Bez-nazvania53-20260711220711.png');
    background-size: cover;
    background-position: center;
  }
  .app::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(11, 14, 20, 0.5);
    z-index: 0;
  }
  .app > * {
    position: relative;
    z-index: 1;
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 20px;
    text-align: center;
  }
  .content h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 12px;
    transition: 0.3s;
  }
  .content h1 span {
    color: #FFD24C;
  }
  .content p {
    color: #9CA3AF;
    font-size: 16px;
    max-width: 280px;
    transition: 0.3s;
  }

  .widget-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 8px 20px 16px;
    width: 100%;
  }
  .widget-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    padding: 0;
    width: 100%;
    max-width: 460px;
    height: 200px;
    border-radius: 40px;
    overflow: hidden;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: none;
  }
  .widget-btn img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="app">
    <div class="content" id="pageContent">
      <h1>🏠 <span id="pageTitle">Главная</span></h1>
      <p id="pageDesc">Контент главной страницы</p>
    </div>

    <div class="widget-wrapper">
      <button class="widget-btn" id="widget">
        <img id="widgetImg" src="https://i.postimg.cc/yYHHgNwk/Picsart-26-07-12-11-20-57-902.png" alt="Переключить">
      </button>
    </div>
  </div>

  <script>
    (function() {
      const widget = document.getElementById('widget');
      const widgetImg = document.getElementById('widgetImg');
      const pageTitle = document.getElementById('pageTitle');
      const pageDesc = document.getElementById('pageDesc');

      const homeSrc = 'https://i.postimg.cc/yYHHgNwk/Picsart-26-07-12-11-20-57-902.png';
      const profileSrc = 'https://i.postimg.cc/X7VP6BRf/Picsart-26-07-12-11-23-18-386.png';

      let isHome = true;

      widget.addEventListener('click', function() {
        if (isHome) {
          widgetImg.src = profileSrc;
          pageTitle.textContent = 'Профиль';
          pageDesc.textContent = 'Информация о пользователе';
          isHome = false;
        } else {
          widgetImg.src = homeSrc;
          pageTitle.textContent = 'Главная';
          pageDesc.textContent = 'Контент главной страницы';
          isHome = true;
        }
      });
    })();
  </script>
</body>
</html>
