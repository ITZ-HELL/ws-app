<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>App</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0B0E14;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .app {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background-image: url('https://i.ibb.co/NnsmrSyb/Bez-nazvania53-20260711220711.png');
    background-size: cover;
    background-position: center;
  }
  .app::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(11, 14, 20, 0.6);
    z-index: 0;
  }
  .app > * {
    position: relative;
    z-index: 1;
  }

  /* СТРАНИЦЫ */
  .pages-viewport {
    flex: 1;
    position: relative;
    overflow: hidden;
    touch-action: pan-y;
  }
  .pages-track {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 200%;
    display: flex;
    transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .page {
    width: 50%;
    height: 100%;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 20px;
    text-align: center;
  }
  .page h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .page h1 span {
    color: #FFD24C;
  }
  .page p {
    color: #9CA3AF;
    font-size: 16px;
    max-width: 280px;
  }

  /* НАВИГАЦИЯ — ВНИЗУ, КРУГЛЫЙ ХИТБОКС */
  .nav-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
    padding: 0 16px 8px;
    width: 100%;
    position: fixed;
    bottom: 0;
    left: 0;
    z-index: 10;
  }
  .nav-btn {
    position: relative;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    cursor: pointer;
    padding: 0;
    overflow: hidden;
    border-radius: 50%;
    width: 72px;
    height: 72px;
  }
  .nav-btn img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    pointer-events: none;
    border-radius: 50%;
  }
  /* ЖИДКОЕ СТЕКЛО */
  .ripple {
    position: absolute;
    border-radius: 50%;
    width: 14px;
    height: 14px;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    pointer-events: none;
    background: linear-gradient(145deg, rgba(255,255,255,0.35) 0%, rgba(255,210,76,0.18) 45%, rgba(255,255,255,0.05) 100%);
    backdrop-filter: blur(4px) saturate(180%);
    -webkit-backdrop-filter: blur(4px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.55);
    box-shadow: inset 0 0 10px rgba(255,255,255,0.5), inset 0 -6px 12px rgba(255,190,40,0.25), 0 0 24px rgba(255,210,76,0.35);
  }
  .ripple.animate {
    animation: liquidWave 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes liquidWave {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    12% { opacity: 1; }
    55% { opacity: 0.85; }
    100% { transform: translate(-50%,-50%) scale(9); opacity: 0; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="pages-viewport" id="viewport">
    <div class="pages-track" id="track">
      <div class="page" data-page="home">
        <h1>🏠 <span>Главная</span></h1>
        <p>Список контейнеров, баланс, кнопки покупки</p>
      </div>
      <div class="page" data-page="profile">
        <h1>👤 <span>Профиль</span></h1>
        <p>Статистика, инвентарь, настройки</p>
      </div>
    </div>
  </div>

  <div class="nav-row">
    <button class="nav-btn active" data-page="home">
      <img src="https://i.postimg.cc/WbPj607K/Bez-nazvania55-20260712021411.png" alt="Главная">
    </button>
    <button class="nav-btn" data-page="profile">
      <img src="https://i.postimg.cc/bvFpQM69/Bez-nazvania55-20260712015252.png" alt="Профиль">
    </button>
  </div>
</div>

<script>
(function() {
  var track = document.getElementById('track');
  var viewport = document.getElementById('viewport');
  var btns = document.querySelectorAll('.nav-btn');

  var pages = { home: 0, profile: 1 };
  var current = 0;
  var startX = 0, startY = 0, deltaX = 0, isSwiping = false;
  var threshold = 50;

  function render() {
    track.style.transform = 'translateX(' + (-current * 50) + '%)';
    btns.forEach(function(b) {
      b.classList.toggle('active', pages[b.dataset.page] === current);
    });
  }

  function goTo(index) {
    if (index === current) return;
    current = index;
    render();
  }

  function spawnRipple(btn, x, y) {
    var ripple = document.createElement('div');
    ripple.className = 'ripple';
    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';
    btn.appendChild(ripple);
    requestAnimationFrame(function(){ ripple.classList.add('animate'); });
    ripple.addEventListener('animationend', function(){ ripple.remove(); });
  }

  btns.forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      var rect = btn.getBoundingClientRect();
      var x = (e.clientX || rect.left + rect.width/2) - rect.left;
      var y = (e.clientY || rect.top + rect.height/2) - rect.top;
      spawnRipple(btn, x, y);
      var page = pages[btn.dataset.page];
      if (page !== undefined) goTo(page);
    });
  });

  viewport.addEventListener('touchstart', function(e) {
    var t = e.touches[0];
    startX = t.clientX;
    startY = t.clientY;
    deltaX = 0;
    isSwiping = true;
    track.style.transition = 'none';
  }, { passive: true });

  viewport.addEventListener('touchmove', function(e) {
    if (!isSwiping) return;
    var t = e.touches[0];
    var dx = t.clientX - startX;
    var dy = t.clientY - startY;
    if (Math.abs(dx) < Math.abs(dy)) return;
    deltaX = dx;
    if (current === 0 && dx > 0) deltaX = 0;
    if (current === 1 && dx < 0) deltaX = 0;
    var percent = (deltaX / viewport.offsetWidth) * 50;
    track.style.transform = 'translateX(' + (-current * 50 + percent) + '%)';
  }, { passive: true });

  viewport.addEventListener('touchend', function() {
    if (!isSwiping) return;
    isSwiping = false;
    track.style.transition = 'transform 0.35s cubic-bezier(0.22, 1, 0.36, 1)';
    if (deltaX <= -threshold && current === 0) goTo(1);
    else if (deltaX >= threshold && current === 1) goTo(0);
    else render();
    deltaX = 0;
  });

  render();

  if (window.Telegram && window.Telegram.WebApp) {
    try {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    } catch(e) {}
  }
})();
</script>

</body>
</html>
