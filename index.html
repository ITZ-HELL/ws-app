<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Whiskars</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0B0E14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app {
            max-width: 400px;
            width: 100%;
            background-image: url('https://i.postimg.cc/7hNFQkQ7/Bez-nazvania53-20260711220851.png');
            background-size: cover;
            background-position: center;
            border-radius: 28px;
            padding: 20px 16px 80px;
            position: relative;
            min-height: 700px;
            box-shadow: 0 0 40px rgba(251, 191, 36, 0.1);
        }
        /* Полупрозрачный слой для читаемости */
        .app::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 14, 20, 0.65);
            border-radius: 28px;
            z-index: 0;
        }
        .header, .cases, .nav {
            position: relative;
            z-index: 1;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(251, 191, 36, 0.2);
            margin-bottom: 20px;
        }
        .logo {
            font-family: 'Exo 2', sans-serif;
            font-weight: 700;
            font-size: 20px;
            color: #fff;
        }
        .logo span {
            color: #FBBF24;
        }
        .balance {
            background: rgba(251, 191, 36, 0.15);
            border: 1px solid rgba(251, 191, 36, 0.3);
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            color: #FBBF24;
        }
        .case {
            background: rgba(26, 31, 46, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: 0.2s;
        }
        .case:hover {
            border-color: rgba(251, 191, 36, 0.3);
        }
        .case-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .case-icon {
            width: 56px;
            height: 56px;
            background: rgba(251, 191, 36, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .case-info {
            flex: 1;
        }
        .case-title {
            color: #fff;
            font-weight: 600;
            font-size: 17px;
        }
        .case-desc {
            color: #9CA3AF;
            font-size: 13px;
            margin-top: 2px;
        }
        .case-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }
        .case-price {
            color: #FBBF24;
            font-weight: 700;
            font-size: 18px;
            font-family: 'Exo 2', sans-serif;
        }
        .btn {
            background: #FBBF24;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            color: #0B0E14;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover {
            background: #F59E0B;
        }
        .nav {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            background: rgba(18, 22, 34, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 10;
        }
        .nav-item {
            text-align: center;
            color: #6B7280;
            font-size: 11px;
            font-weight: 500;
            transition: 0.2s;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 12px;
        }
        .nav-item.active {
            color: #FBBF24;
        }
        .nav-item .icon {
            font-size: 22px;
            display: block;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Шапка -->
        <div class="header">
            <div class="logo">CASINO <span>WHISKARS</span></div>
            <div class="balance">💰 0 ₽</div>
        </div>

        <!-- Контейнеры -->
        <div class="cases">
            <div class="case">
                <div class="case-top">
                    <div class="case-icon">🔮</div>
                    <div class="case-info">
                        <div class="case-title">Секретный контейнер</div>
                        <div class="case-desc">Неизвестно, что внутри…</div>
                    </div>
                </div>
                <div class="case-bottom">
                    <span class="case-price">500 ₽</span>
                    <button class="btn">Купить</button>
                </div>
            </div>

            <div class="case">
                <div class="case-top">
                    <div class="case-icon">💎</div>
                    <div class="case-info">
                        <div class="case-title">Синий контейнер</div>
                        <div class="case-desc">Пришёл из Америки</div>
                    </div>
                </div>
                <div class="case-bottom">
                    <span class="case-price">300 ₽</span>
                    <button class="btn">Купить</button>
                </div>
            </div>

            <div class="case">
                <div class="case-top">
                    <div class="case-icon">👑</div>
                    <div class="case-info">
                        <div class="case-title">Золотой контейнер</div>
                        <div class="case-desc">Реликвия древних</div>
                    </div>
                </div>
                <div class="case-bottom">
                    <span class="case-price">1 500 ₽</span>
                    <button class="btn">Купить</button>
                </div>
            </div>
        </div>

        <!-- Навигация -->
        <div class="nav">
            <button class="nav-item active">
                <span class="icon">🏠</span> Главная
            </button>
            <button class="nav-item">
                <span class="icon">⬆️</span> Upgrade
            </button>
            <button class="nav-item">
                <span class="icon">👤</span> Профиль
            </button>
        </div>
    </div>
</body>
</html>
