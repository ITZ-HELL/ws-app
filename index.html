<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Whiskars</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0B0E14;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app {
            max-width: 400px;
            width: 100%;
            background-image: url('https://i.postimg.cc/7hNFQkQ7/Bez-nazvania53-20260711220851.png');
            background-size: cover;
            background-position: center;
            border-radius: 32px;
            padding: 24px 18px 80px;
            position: relative;
            min-height: 500px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .app::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 14, 20, 0.6);
            border-radius: 32px;
            z-index: 0;
        }
        .content, .nav {
            position: relative;
            z-index: 1;
        }

        .content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            width: 100%;
        }
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
            text-align: center;
        }
        .page.active {
            display: flex;
        }
        .page h2 {
            color: #fff;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .page p {
            color: #9CA3AF;
            font-size: 16px;
        }

        /* НАВИГАЦИЯ (одна кнопка-переключатель) */
        .nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            z-index: 10;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            touch-action: none;
            cursor: pointer;
        }
        .nav img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }
        /* Эффект жидкого стекла (круглая волна) */
        .nav .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(251, 191, 36, 0.25);
            transform: scale(0);
            animation: rippleAnim 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 2;
            width: 100px;
            height: 100px;
            margin-left: -50px;
            margin-top: -50px;
            top: 50%;
            left: 50%;
        }
        @keyframes rippleAnim {
            0% {
                transform: scale(0);
                opacity: 0.8;
            }
            100% {
                transform: scale(3);
                opacity: 0;
            }
        }
        /* Ползунок (drag) */
        .nav.dragging {
            transition: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="content">
            <div id="page-main" class="page active">
                <h2>🏠 Главная</h2>
                <p>Контент главной страницы</p>
            </div>
            <div id="page-profile" class="page">
                <h2>👤 Профиль</h2>
                <p>Контент профиля</p>
            </div>
        </div>

        <div class="nav" id="navSwitch">
            <img id="navImage" src="https://i.postimg.cc/WbPj607K/Bez-nazvania55-20260712021411.png" alt="Переключить">
            <div class="ripple" id="ripple"></div>
        </div>
    </div>

    <script>
        const navSwitch = document.getElementById('navSwitch');
        const navImage = document.getElementById('navImage');
        const ripple = document.getElementById('ripple');
        const pageMain = document.getElementById('page-main');
        const pageProfile = document.getElementById('page-profile');
        let isMain = true;
        let startX = 0;
        let isDragging = false;

        // Функция переключения с эффектом
        function switchPage() {
            // Анимация жидкого стекла (круг)
            ripple.style.animation = 'none';
            void ripple.offsetWidth;
            ripple.style.animation = 'rippleAnim 0.6s ease-out forwards';

            if (isMain) {
                pageMain.classList.remove('active');
                pageProfile.classList.add('active');
                navImage.src = 'https://i.postimg.cc/bvFpQM69/Bez-nazvania55-20260712015252.png';
                isMain = false;
            } else {
                pageProfile.classList.remove('active');
                pageMain.classList.add('active');
                navImage.src = 'https://i.postimg.cc/WbPj607K/Bez-nazvania55-20260712021411.png';
                isMain = true;
            }
        }

        // Клик
        navSwitch.addEventListener('click', switchPage);

        // Ползунок пальцем (drag)
        navSwitch.addEventListener('touchstart', function(e) {
            startX = e.touches[0].clientX;
            isDragging = true;
            navSwitch.classList.add('dragging');
        });

        navSwitch.addEventListener('touchmove', function(e) {
            if (!isDragging) return;
            const deltaX = e.touches[0].clientX - startX;
            if (Math.abs(deltaX) > 40) {
                if (deltaX > 0 && !isMain) {
                    // Свайп вправо → на Главную
                    switchPage();
                    isDragging = false;
                } else if (deltaX < 0 && isMain) {
                    // Свайп влево → на Профиль
                    switchPage();
                    isDragging = false;
                }
                startX = e.touches[0].clientX;
            }
        });

        navSwitch.addEventListener('touchend', function() {
            isDragging = false;
            navSwitch.classList.remove('dragging');
        });
    </script>
</body>
</html>
