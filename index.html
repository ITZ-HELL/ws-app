<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Whiskars</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0B0E14;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 16px;
        }
        .app {
            max-width: 400px;
            width: 100%;
            min-height: 600px;
            border-radius: 32px;
            padding: 24px 18px 100px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: url('https://i.postimg.cc/7hNFQkQ7/Bez-nazvania53-20260711220851.png');
            background-size: cover;
            background-position: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }
        .app::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(11, 14, 20, 0.6);
            border-radius: 32px;
            z-index: 0;
        }
        .content, .nav {
            position: relative;
            z-index: 1;
            width: 100%;
        }
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            text-align: center;
        }
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .page.active {
            display: flex;
        }
        .page h2 {
            color: #fff;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .page p {
            color: #9CA3AF;
            font-size: 16px;
        }

        /* ===== НАВИГАЦИЯ (две кнопки) ===== */
        .nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 400px;
            width: calc(100% - 32px);
            display: flex;
            gap: 12px;
            justify-content: center;
            z-index: 10;
        }
        .nav-btn {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 12px 0;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 16px;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            transition: 0.2s;
        }
        .nav-btn img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }
        /* Жидкое стекло внутри кнопки */
        .ripple {
            position: absolute;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            pointer-events: none;
            background: linear-gradient(
                145deg,
                rgba(255, 255, 255, 0.35) 0%,
                rgba(255, 210, 76, 0.18) 45%,
                rgba(255, 255, 255, 0.05) 100%
            );
            backdrop-filter: blur(4px) saturate(180%);
            -webkit-backdrop-filter: blur(4px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.55);
            box-shadow:
                inset 0 0 10px rgba(255, 255, 255, 0.5),
                inset 0 -6px 12px rgba(255, 190, 40, 0.25),
                0 0 24px rgba(255, 210, 76, 0.35);
            z-index: 5;
        }
        .ripple.animate {
            animation: liquidWave 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes liquidWave {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            12% {
                opacity: 1;
            }
            55% {
                opacity: 0.85;
            }
            100% {
                transform: translate(-50%, -50%) scale(8);
                opacity: 0;
            }
        }
        /* Активная кнопка (подсветка) */
        .nav-btn.active {
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="content">
            <div id="page-main" class="page active">
                <h2>🏠 Главная</h2>
                <p>Контент главной страницы</p>
            </div>
            <div id="page-profile" class="page">
                <h2>👤 Профиль</h2>
                <p>Контент профиля</p>
            </div>
        </div>

        <!-- НАВИГАЦИЯ (две кнопки) -->
        <div class="nav">
            <button class="nav-btn active" id="nav-main">
                <img src="https://i.postimg.cc/WbPj607K/Bez-nazvania55-20260712021411.png" alt="Главная">
            </button>
            <button class="nav-btn" id="nav-profile">
                <img src="https://i.postimg.cc/bvFpQM69/Bez-nazvania55-20260712015252.png" alt="Профиль">
            </button>
        </div>
    </div>

    <script>
        const mainBtn = document.getElementById('nav-main');
        const profileBtn = document.getElementById('nav-profile');
        const pageMain = document.getElementById('page-main');
        const pageProfile = document.getElementById('page-profile');

        function createRipple(e, btn) {
            const rect = btn.getBoundingClientRect();
            const x = (e.clientX || rect.left + rect.width/2) - rect.left;
            const y = (e.clientY || rect.top + rect.height/2) - rect.top;

            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            btn.appendChild(ripple);

            requestAnimationFrame(() => ripple.classList.add('animate'));
            ripple.addEventListener('animationend', () => ripple.remove());
        }

        function switchToMain(e) {
            if (pageMain.classList.contains('active')) return;
            createRipple(e, mainBtn);
            pageProfile.classList.remove('active');
            pageMain.classList.add('active');
            mainBtn.classList.add('active');
            profileBtn.classList.remove('active');
        }

        function switchToProfile(e) {
            if (pageProfile.classList.contains('active')) return;
            createRipple(e, profileBtn);
            pageMain.classList.remove('active');
            pageProfile.classList.add('active');
            profileBtn.classList.add('active');
            mainBtn.classList.remove('active');
        }

        mainBtn.addEventListener('click', switchToMain);
        profileBtn.addEventListener('click', switchToProfile);
    </script>
</body>
</html>
