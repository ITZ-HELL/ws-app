<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>App</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0B0E14;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .app {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background-image: url('https://i.postimg.cc/CLtRpSWb/Bez-nazvania53-20260711220711.png');
    background-size: cover;
    background-position: center;
  }
  .app::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(11, 14, 20, 0.5);
    z-index: 0;
  }
  .app > * {
    position: relative;
    z-index: 1;
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 20px;
    text-align: center;
    transition: opacity 0.3s ease;
  }
  .content h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .content h1 span {
    color: #FFD24C;
  }
  .content p {
    color: #9CA3AF;
    font-size: 16px;
    max-width: 280px;
  }

  /* ===== ВИДЖЕТ (CSS) ===== */
  .widget-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 8px 20px 16px;
    width: 100%;
  }
  .widget-panel {
    width: 100%;
    max-width: 440px;
    height: 160px;
    border-radius: 40px;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 0 16px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.3);
    cursor: pointer;
    transition: 0.2s;
  }
  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    padding: 8px 16px;
    cursor: pointer;
    transition: 0.2s;
    border-radius: 20px;
    flex: 1;
  }
  .nav-btn .icon {
    font-size: 32px;
    line-height: 1;
    color: #6B7280;
    transition: 0.2s;
  }
  .nav-btn .label {
    font-size: 14px;
    font-weight: 500;
    color: #6B7280;
    transition: 0.2s;
  }
  .nav-btn.active .icon,
  .nav-btn.active .label {
    color: #FFD24C;
  }
  .nav-btn.active .label {
    font-weight: 600;
  }
  /* Ховер для всех кнопок */
  .nav-btn:hover .icon,
  .nav-btn:hover .label {
    color: #FFD24C;
  }
</style>
</head>
<body>
  <div class="app">
    <div class="content" id="pageContent">
      <h1>🏠 <span id="pageTitle">Главная</span></h1>
      <p id="pageDesc">Контент главной страницы</p>
    </div>

    <div class="widget-wrapper">
      <div class="widget-panel" id="widgetPanel">
        <button class="nav-btn active" data-page="home">
          <span class="icon">🏠</span>
          <span class="label">Главная</span>
        </button>
        <button class="nav-btn" data-page="profile">
          <span class="icon">👤</span>
          <span class="label">Профиль</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const panel = document.getElementById('widgetPanel');
      const buttons = panel.querySelectorAll('.nav-btn');
      const pageTitle = document.getElementById('pageTitle');
      const pageDesc = document.getElementById('pageDesc');

      let current = 'home';

      buttons.forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const target = btn.dataset.page;
          if (target === current) return;

          // Обновляем активную кнопку
          buttons.forEach(function(b) {
            b.classList.toggle('active', b.dataset.page === target);
          });

          current = target;

          // Обновляем контент
          if (target === 'home') {
            pageTitle.textContent = 'Главная';
            pageDesc.textContent = 'Контент главной страницы';
          } else {
            pageTitle.textContent = 'Профиль';
            pageDesc.textContent = 'Информация о пользователе';
          }
        });
      });
    })();
  </script>
</body>
</html>
