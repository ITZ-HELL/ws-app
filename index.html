<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#0B0E14}
  .app{position:fixed;top:0;left:0;width:100%;height:100%;background-image:url('https://i.postimg.cc/CLtRpSWb/Bez-nazvania53-20260711220711.png');background-size:cover;background-position:center;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
  .app::before{content:'';position:absolute;inset:0;background:rgba(11,14,20,0.4);z-index:0}
  .app>*{position:relative;z-index:1}

  .header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px;gap:8px}
  .header.hidden{display:none}
  .header-left{display:flex;align-items:center;gap:12px}
  .avatar-wrapper{width:52px;height:52px;border-radius:50%;background:#0B0E14;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid rgba(255,255,255,0.06)}
  .avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:#fff;background:#6C6C6C;text-transform:uppercase}
  .avatar img{width:100%;height:100%;object-fit:cover;display:block}
  .topup-btn{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:#0B0E14;background:#FFD24C;padding:6px 16px;border:none;border-radius:20px;cursor:pointer;transition:0.2s;white-space:nowrap;box-shadow:0 0 20px rgba(255,210,76,0.15)}
  .topup-btn:hover{background:#F5C53B;transform:scale(1.02)}

  .balance-wrapper{position:absolute;top:16px;right:20px;z-index:10}
  .balance-block{background:rgba(255,255,255,0.06);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:16px;padding:6px 14px;border:1px solid rgba(255,255,255,0.06);display:inline-flex;align-items:center;justify-content:center;min-width:40px;max-width:200px;transition:all 0.2s ease}
  .balance{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:700;color:#FFFFFF;letter-spacing:0.5px;white-space:nowrap}
  .balance .currency{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:600;color:#FFFFFF;margin-left:2px;opacity:0.8}

  .card{width:calc(100% - 40px);max-width:600px;height:160px;margin:12px auto 0;border-radius:28px;overflow:hidden;background-size:cover;background-position:center;position:relative;box-shadow:0 4px 20px rgba(0,0,0,0.3);cursor:pointer}
  .card-label{position:absolute;bottom:16px;left:12px;font-family:'Montserrat',sans-serif;font-size:26px;font-weight:800;color:#FFFFFF;text-shadow:0 2px 20px rgba(0,0,0,0.9);letter-spacing:2px}

  .content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px 0;text-align:center;overflow-y:auto}
  .page{display:none;flex-direction:column;align-items:center;justify-content:flex-start;width:100%;height:100%;padding-top:0}
  .page.active{display:flex}

  .profile-container{display:flex;align-items:center;gap:14px;width:100%;max-width:400px;padding:0 16px;margin-bottom:6px}
  .profile-avatar-wrapper{width:64px;height:64px;border-radius:50%;background:#0B0E14;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid rgba(255,255,255,0.06)}
  .profile-avatar{width:56px;height:56px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:600;color:#fff;background:#6C6C6C;text-transform:uppercase}
  .profile-avatar img{width:100%;height:100%;object-fit:cover}
  .profile-info{display:flex;flex-direction:column;align-items:flex-start;gap:2px}
  .profile-name{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:700;color:#FFFFFF;line-height:1.2}
  .profile-username{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:500;color:#9CA3AF}
  .profile-id{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:400;color:#6B7280;letter-spacing:0.5px}

  .stats-block{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:28px;padding:12px 28px;border:1px solid rgba(255,255,255,0.06);width:calc(100% - 32px);max-width:380px;display:flex;flex-direction:column;gap:6px;margin-top:4px}
  .stats-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
  .stats-row:last-child{border-bottom:none}
  .stats-label{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:500;color:#9CA3AF;letter-spacing:0.3px}
  .stats-value{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:700;color:#FFFFFF;letter-spacing:0.5px}

  .divider-wrapper{width:calc(100% - 32px);max-width:380px;display:flex;align-items:center;gap:12px;margin-top:40px}
  .divider-line{flex:1;height:1px;background:rgba(255,255,255,0.08)}
  .divider-label{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:#FFFFFF;letter-spacing:1.5px;white-space:nowrap;opacity:0.9}
  .empty-text{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:700;color:#6B7280;letter-spacing:4px;text-transform:uppercase;margin-top:60px;opacity:0.4}

  .empty-page{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;position:absolute;top:0;left:0;z-index:20;background:rgba(11,14,20,0.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  .empty-page.active{display:flex}
  .empty-back{position:absolute;top:12px;left:16px;background:rgba(255,255,255,0.06);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:12px;padding:6px 14px;border:1px solid rgba(255,255,255,0.06);z-index:5;color:#FFFFFF;font-family:'Montserrat',sans-serif;font-size:15px;font-weight:700;cursor:pointer;border:none}

  .topup-page{display:none;flex-direction:column;align-items:center;justify-content:flex-start;width:100%;height:100%;position:absolute;top:0;left:0;z-index:20;background:rgba(11,14,20,0.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding-top:70px}
  .topup-page.active{display:flex}
  .back-wrapper{position:absolute;top:16px;left:16px;background:rgba(255,255,255,0.06);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:12px;padding:8px 16px;border:1px solid rgba(255,255,255,0.06);z-index:5}
  .back-btn{background:none;border:none;color:#FFFFFF;font-family:'Montserrat',sans-serif;font-size:16px;font-weight:700;cursor:pointer;padding:0;line-height:1}

  .topup-content{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:0 20px;width:100%;max-width:380px;margin-top:10px;gap:12px;flex:1}
  .topup-island{background:#000000;border-radius:24px;padding:20px 24px;border:1px solid rgba(255,255,255,0.04);box-shadow:0 4px 30px rgba(0,0,0,0.3);width:100%}
  .topup-island .title{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:#FFFFFF;margin-bottom:4px}
  .topup-island .sub{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:400;color:#9CA3AF;letter-spacing:0.3px}

  .currency-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
  .currency-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px 12px;text-align:center;font-family:'Montserrat',sans-serif;font-size:15px;font-weight:600;color:#FFFFFF;cursor:pointer;transition:0.2s}
  .currency-btn:active{transform:scale(0.96)}
  .currency-btn.active{background:rgba(255,210,76,0.12);border-color:#FFD24C;color:#FFD24C}

  .topup-input-block{background:rgba(255,255,255,0.05);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:14px;padding:10px 16px;border:1px solid rgba(255,255,255,0.06);width:100%;display:flex;flex-direction:column;align-items:flex-start;gap:4px}
  .topup-input-block label{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;color:#9CA3AF;letter-spacing:0.3px}
  .topup-input-block input{width:100%;padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#FFFFFF;font-family:'Montserrat',sans-serif;font-size:18px;font-weight:600;text-align:left;outline:none;height:42px}
  .topup-input-block input:focus{border-color:#FFD24C}
  .topup-input-block input::placeholder{color:#6B7280;font-weight:400;font-size:15px}

  .topup-confirm{background:#FFD24C;color:#0B0E14;padding:14px 20px;border-radius:16px;border:none;font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;cursor:pointer;width:100%;transition:0.2s;box-shadow:0 4px 20px rgba(255,210,76,0.2);margin-top:auto;margin-bottom:12px}
  .topup-confirm:active{transform:scale(0.96)}
  .topup-confirm a{color:#0B0E14;text-decoration:none;display:block;width:100%;height:100%}

  .upgrade-container{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:4px;width:100%;max-width:380px;padding:2px 20px 20px;margin-top:-40px}
  .wheel-wrap{position:relative;width:240px;height:240px}
  .wheel-bg{position:absolute;inset:12px;border-radius:50%;background:#17171d}
  .wheel-arc{position:absolute;inset:12px;border-radius:50%;background:conic-gradient(from 0deg,#232329 0deg,#232329 125deg,#ff7a00 125deg,#ffcc00 180deg,#ff7a00 235deg,#232329 235deg,#232329 360deg);-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 26px),#000 calc(100% - 26px));mask:radial-gradient(farthest-side,transparent calc(100% - 26px),#000 calc(100% - 26px));filter:drop-shadow(0 0 14px rgba(255,150,0,0.35))}
  .center-empty{position:absolute;inset:40px;border-radius:50%;background:radial-gradient(circle at 50% 40%,#1c1c24,#101014 80%)}
  .pointer-rotator{position:absolute;inset:0;transform:rotate(0deg);z-index:5}
  .arrow{position:absolute;bottom:-14px;left:50%;width:40px;height:26px;transform:translateX(-50%)}
  .arrow svg{width:100%;height:100%;filter:drop-shadow(0 0 6px rgba(255,212,0,0.85))}
  .spin-btn{background:#FFD24C;color:#0B0E14;padding:6px 20px;border-radius:14px;border:none;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:0.2s;letter-spacing:1.5px;width:auto}
  .spin-btn:active{transform:scale(0.96)}
  .spin-btn:disabled{opacity:0.4;pointer-events:none}
  .result{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:800;height:22px;letter-spacing:1px;margin-top:0}
  .result.success{color:#FFD24C}
  .result.fail{color:#ff4d4d}
  .speed-toggle{display:flex;gap:8px;justify-content:center;margin-top:2px}
  .speed-btn{padding:4px 14px;font-size:11px;font-weight:600;border:1px solid #333;border-radius:6px;background:#1c1c24;color:#999;cursor:pointer;font-family:'Montserrat',sans-serif}
  .speed-btn.active{background:#2a2a1a;border-color:#ffcc00;color:#ffcc00}
  .speed-btn:disabled{opacity:0.5;cursor:default}

  .widget-wrapper{display:flex;justify-content:center;align-items:center;padding:4px 20px 8px;width:100%}
  .widget-panel{width:100%;max-width:360px;height:70px;border-radius:24px;background:rgba(255,255,255,0.06);backdrop-filter:blur(10px) saturate(180%);-webkit-backdrop-filter:blur(10px) saturate(180%);border:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-around;align-items:center;padding:0 12px;box-shadow:0 4px 30px rgba(0,0,0,0.2)}
  .nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;padding:4px 12px;cursor:pointer;border-radius:14px;flex:1;font-family:inherit;transition:0.2s}
  .nav-btn svg{width:24px;height:24px;stroke:#9CA3AF;stroke-width:1.8;fill:none;transition:0.2s}
  .nav-btn .label{font-size:11px;font-weight:500;color:#9CA3AF;transition:0.2s;letter-spacing:0.3px}
  .nav-btn.active svg{stroke:#FFD24C}
  .nav-btn.active .label{color:#FFD24C;font-weight:600}
</style>
</head>
<body>
  <div class="app">
    <div class="balance-wrapper">
      <div class="balance-block">
        <div class="balance" id="balance">0 <span class="currency">₽</span></div>
      </div>
    </div>

    <div class="header" id="mainHeader">
      <div class="header-left">
        <div class="avatar-wrapper">
          <div class="avatar" id="avatar"></div>
        </div>
        <button class="topup-btn" id="topupBtn">Пополнить</button>
      </div>
    </div>

    <div class="content">
      <div id="page-home" class="page active">
        <div class="card" style="background-image:url('https://i.postimg.cc/Bb6ZNrLB/quality-restoration-20260712180340135-2.jpg');margin-top:24px;" id="rocketCard">
          <div class="card-label">РАКЕТА</div>
        </div>
        <div class="card" style="background-image:url('https://i.postimg.cc/W31ptCvR/Bez-nazvania58-20260712200059.png');" id="upgradeCard">
          <div class="card-label">UPGRADE</div>
        </div>
      </div>

      <div id="page-profile" class="page">
        <div class="profile-container">
          <div class="profile-avatar-wrapper">
            <div class="profile-avatar" id="profileAvatar"></div>
          </div>
          <div class="profile-info">
            <div class="profile-name" id="profileName">Имя</div>
            <div class="profile-username" id="profileUsername">@username</div>
            <div class="profile-id" id="profileId">ID: 0</div>
          </div>
        </div>
        <div class="stats-block">
          <div class="stats-row">
            <span class="stats-label">Открыто кейсов</span>
            <span class="stats-value" id="statsCases">0</span>
          </div>
          <div class="stats-row">
            <span class="stats-label">Всего предметов</span>
            <span class="stats-value" id="statsItems">0</span>
          </div>
        </div>
        <div class="divider-wrapper">
          <span class="divider-line"></span>
          <span class="divider-label">ИНВЕНТАРЬ</span>
          <span class="divider-line"></span>
        </div>
        <div class="empty-text">пусто</div>
      </div>
    </div>

    <div class="empty-page" id="rocketPage">
      <button class="empty-back" id="rocketBack">Назад</button>
    </div>

    <div class="empty-page" id="upgradePage">
      <button class="empty-back" id="upgradeBack">Назад</button>
      <div class="upgrade-container">
        <div class="wheel-wrap">
          <div class="wheel-bg"></div>
          <div class="wheel-arc"></div>
          <div class="center-empty"></div>
          <div class="pointer-rotator" id="spinLayer">
            <div class="arrow">
              <svg viewBox="0 0 40 26" xmlns="http://www.w3.org/2000/svg">
                <polygon points="20,0 40,18 28,18 20,10 12,18 0,18" fill="#ffd400"/>
                <polygon points="20,8 40,26 28,26 20,18 12,26 0,26" fill="#7a6100"/>
              </svg>
            </div>
          </div>
        </div>
        <button class="spin-btn" id="spinBtn">UPGRADE</button>
        <div class="result" id="result"></div>
        <div class="speed-toggle">
          <button class="speed-btn active" id="speedFast">БЫСТРО</button>
          <button class="speed-btn" id="speedSlow">МЕДЛЕННО</button>
        </div>
      </div>
    </div>

    <div class="topup-page" id="topupPage">
      <div class="back-wrapper">
        <button class="back-btn" id="backBtn">Назад</button>
      </div>
      <div class="topup-content">
        <div class="topup-island">
          <div class="title">Выберите валюту</div>
          <div class="sub">Способ пополнения</div>
        </div>
        <div class="currency-grid">
          <button class="currency-btn active">Рубли</button>
          <button class="currency-btn">Gram</button>
          <button class="currency-btn">Telegram Stars</button>
          <button class="currency-btn">USDT</button>
        </div>
        <div class="currency-grid" style="margin-top:4px;">
          <button class="currency-btn">Белорусские рубли</button>
          <button class="currency-btn">Тенге</button>
          <button class="currency-btn">ММ2</button>
          <button class="currency-btn" style="opacity:0;pointer-events:none;"></button>
        </div>
        <div class="topup-input-block">
          <label>Сумма пополнения</label>
          <input type="number" id="amountInput" placeholder="Введите сумму.." min="1" step="1">
        </div>
        <button class="topup-confirm" id="topupConfirmBtn">
          <a href="https://t.me/Seller_Whiskars" target="_blank">Пополнить</a>
        </button>
      </div>
    </div>

    <div class="widget-wrapper">
      <div class="widget-panel" id="widgetPanel">
        <button class="nav-btn active" data-page="home">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
            <path d="M3 12l9-9 9 9" />
            <path d="M5 10v9a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1v-9" />
          </svg>
          <span class="label">Главная</span>
        </button>
        <button class="nav-btn" data-page="profile">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.5-6 8-6s8 2 8 6" />
          </svg>
          <span class="label">Профиль</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.expand();

      const avatarEl = document.getElementById('avatar');
      const profileAvatarEl = document.getElementById('profileAvatar');
      const profileNameEl = document.getElementById('profileName');
      const profileUsernameEl = document.getElementById('profileUsername');
      const profileIdEl = document.getElementById('profileId');

      const colors = ['#FF6B6B', '#FF9F43', '#FECA57', '#48DBFB', '#0ABDE3', '#10AC84', '#EE5A24', '#5F27CD'];

      function getColorFromId(id) {
        if (!id) return colors[0];
        const index = id % colors.length;
        return colors[index];
      }

      function setAvatar(container, user) {
        const name = user.first_name || 'User';
        const firstLetter = name.charAt(0).toUpperCase();
        if (user.photo_url) {
          container.innerHTML = `<img src="${user.photo_url}" alt="Аватар">`;
        } else {
          const bgColor = getColorFromId(user.id);
          container.style.background = bgColor;
          container.textContent = firstLetter;
        }
      }

      if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
        const user = window.Telegram.WebApp.initDataUnsafe.user;
        setAvatar(avatarEl, user);
        setAvatar(profileAvatarEl, user);
        profileNameEl.textContent = user.first_name || 'User';
        profileUsernameEl.textContent = user.username ? '@' + user.username : 'нет юзернейма';
        profileIdEl.textContent = 'ID: ' + user.id;
      } else {
        avatarEl.style.background = '#6C6C6C';
        avatarEl.textContent = '👤';
        profileAvatarEl.style.background = '#6C6C6C';
        profileAvatarEl.textContent = '👤';
        profileNameEl.textContent = 'Гость';
        profileUsernameEl.textContent = 'не авторизован';
        profileIdEl.textContent = 'ID: 0';
      }

      const panel = document.getElementById('widgetPanel');
      const buttons = panel.querySelectorAll('.nav-btn');
      const pageHome = document.getElementById('page-home');
      const pageProfile = document.getElementById('page-profile');
      const mainHeader = document.getElementById('mainHeader');
      const topupPage = document.getElementById('topupPage');
      const backBtn = document.getElementById('backBtn');

      const rocketPage = document.getElementById('rocketPage');
      const upgradePage = document.getElementById('upgradePage');
      const rocketBack = document.getElementById('rocketBack');
      const upgradeBack = document.getElementById('upgradeBack');

      let current = 'home';

      buttons.forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const target = btn.dataset.page;
          if (target === current) return;

          buttons.forEach(function(b) {
            b.classList.toggle('active', b.dataset.page === target);
          });

          current = target;

          if (target === 'home') {
            pageHome.classList.add('active');
            pageProfile.classList.remove('active');
            mainHeader.classList.remove('hidden');
            topupPage.classList.remove('active');
            rocketPage.classList.remove('active');
            upgradePage.classList.remove('active');
          } else {
            pageProfile.classList.add('active');
            pageHome.classList.remove('active');
            mainHeader.classList.add('hidden');
            topupPage.classList.remove('active');
            rocketPage.classList.remove('active');
            upgradePage.classList.remove('active');
          }
        });
      });

      document.getElementById('rocketCard').addEventListener('click', function() {
        rocketPage.classList.add('active');
        pageHome.classList.remove('active');
        pageProfile.classList.remove('active');
        mainHeader.classList.add('hidden');
        buttons.forEach(function(b) { b.classList.remove('active'); });
      });

      rocketBack.addEventListener('click', function() {
        rocketPage.classList.remove('active');
        pageHome.classList.add('active');
        mainHeader.classList.remove('hidden');
        buttons.forEach(function(b) {
          b.classList.toggle('active', b.dataset.page === 'home');
        });
        current = 'home';
      });

      document.getElementById('upgradeCard').addEventListener('click', function() {
        upgradePage.classList.add('active');
        pageHome.classList.remove('active');
        pageProfile.classList.remove('active');
        mainHeader.classList.add('hidden');
        buttons.forEach(function(b) { b.classList.remove('active'); });
      });

      upgradeBack.addEventListener('click', function() {
        upgradePage.classList.remove('active');
        pageHome.classList.add('active');
        mainHeader.classList.remove('hidden');
        buttons.forEach(function(b) {
          b.classList.toggle('active', b.dataset.page === 'home');
        });
        current = 'home';
      });

      document.getElementById('topupBtn').addEventListener('click', function() {
        topupPage.classList.add('active');
        pageHome.classList.remove('active');
        pageProfile.classList.remove('active');
        mainHeader.classList.add('hidden');
        buttons.forEach(function(b) { b.classList.remove('active'); });
      });

      backBtn.addEventListener('click', function() {
        topupPage.classList.remove('active');
        pageHome.classList.add('active');
        mainHeader.classList.remove('hidden');
        buttons.forEach(function(b) {
          b.classList.toggle('active', b.dataset.page === 'home');
        });
        current = 'home';
      });

      document.querySelectorAll('.currency-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.currency-btn').forEach(function(b) {
            b.classList.remove('active');
          });
          this.classList.add('active');
        });
      });

      // ===== КОЛЕСО =====
      const spinLayer = document.getElementById('spinLayer');
      const spinBtn = document.getElementById('spinBtn');
      const resultEl = document.getElementById('result');
      const speedFast = document.getElementById('speedFast');
      const speedSlow = document.getElementById('speedSlow');
      let currentRotation = 0;
      let spinning = false;
      let speedMode = 'fast';
      let audioCtx;

      speedFast.addEventListener('click', function() {
        speedMode = 'fast';
        speedFast.classList.add('active');
        speedSlow.classList.remove('active');
      });
      speedSlow.addEventListener('click', function() {
        speedMode = 'slow';
        speedSlow.classList.add('active');
        speedFast.classList.remove('active');
      });

      function getCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
      }

      function playTick(volume, pitch) {
        const ctx = getCtx();
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(pitch, now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.linearRampToValueAtTime(volume, now + 0.002);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.03);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.035);
      }

      function playResultSound(success) {
        const ctx = getCtx();
        const now = ctx.currentTime;
        if (success) {
          [660, 880, 1320].forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            const start = now + i * 0.09;
            osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(0.0001, start);
            gain.gain.linearRampToValueAtTime(0.18, start + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.5);
            osc.connect(gain).connect(ctx.destination);
            osc.start(start);
            osc.stop(start + 0.55);
          });
        } else {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(180, now);
          osc.frequency.exponentialRampToValueAtTime(55, now + 0.45);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.linearRampToValueAtTime(0.16, now + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
          osc.connect(gain).connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 0.55);
        }
      }

      function easeOutQuint(t) {
        return 1 - Math.pow(1 - t, 5);
      }

      const ZONE_HALF = 55;

      function spin() {
        if (spinning) return;
        spinning = true;
        spinBtn.disabled = true;
        speedFast.disabled = true;
        speedSlow.disabled = true;
        resultEl.textContent = '';
        resultEl.className = 'result';

        const isSuccess = Math.random() < 0.5;
        let targetOffset;
        if (isSuccess) {
          targetOffset = (Math.random() * 2 - 1) * ZONE_HALF;
        } else {
          do {
            targetOffset = Math.random() * 360 - 180;
          } while (Math.abs(targetOffset) <= ZONE_HALF + 8);
        }

        let extraSpins, duration;
        if (speedMode === 'fast') {
          extraSpins = 3 + Math.floor(Math.random() * 2);
          duration = 900 + Math.random() * 300;
        } else {
          extraSpins = 9 + Math.floor(Math.random() * 3);
          duration = 7000 + Math.random() * 2000;
        }

        const startRotation = currentRotation;
        const currentMod = ((startRotation % 360) + 360) % 360;
        let deltaToTarget = ((targetOffset - currentMod) % 360 + 360) % 360;
        const totalDelta = extraSpins * 360 + deltaToTarget;
        const endRotation = startRotation + totalDelta;
        const startTime = performance.now();
        let lastTickStep = Math.floor(startRotation / 14);
        let lastTickTime = 0;
        const MIN_TICK_GAP = 28;

        function frame(now) {
          const elapsed = now - startTime;
          const t = Math.min(elapsed / duration, 1);
          const eased = easeOutQuint(t);
          const rotation = startRotation + totalDelta * eased;
          spinLayer.style.transform = 'rotate(' + rotation + 'deg)';
          const step = Math.floor(rotation / 14);
          if (step !== lastTickStep && (now - lastTickTime) > MIN_TICK_GAP) {
            const intensity = 1 - t;
            playTick(0.06 * intensity + 0.015, 420 + 380 * intensity);
            lastTickStep = step;
            lastTickTime = now;
          }
          if (t < 1) {
            requestAnimationFrame(frame);
          } else {
            currentRotation = endRotation;
            spinning = false;
            spinBtn.disabled = false;
            speedFast.disabled = false;
            speedSlow.disabled = false;
            playResultSound(isSuccess);
            resultEl.textContent = isSuccess ? 'УСПЕХ!' : 'ПРОВАЛ';
            resultEl.className = 'result ' + (isSuccess ? 'success' : 'fail');
          }
        }
        requestAnimationFrame(frame);
      }

      spinBtn.addEventListener('click', spin);
    })();
  </script>
</body>
</html>
