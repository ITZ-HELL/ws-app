<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Whiskars</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0b0e14;
            color: #fff;
            padding: 16px;
            max-width: 500px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1f2937;
        }
        .balance {
            background: #1f2937;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .cases {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 20px;
        }
        .case {
            background: #131a23;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #1f2937;
        }
        .case h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }
        .case .price {
            color: #fbbf24;
            font-weight: 600;
            font-size: 16px;
        }
        .case .desc {
            font-size: 14px;
            color: #9ca3af;
            margin: 6px 0 12px;
        }
        .btn {
            background: #fbbf24;
            color: #0b0e14;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        .btn:hover {
            background: #f59e0b;
        }
        .nav {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: center;
            border-top: 1px solid #1f2937;
            padding-top: 16px;
        }
        .nav a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 8px;
        }
        .nav a.active {
            color: #fbbf24;
            background: #1f2937;
        }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-weight:700;">🎰 Casino Whiskars</span>
        <span class="balance">💰 0 ₽</span>
    </div>

    <div class="cases">
        <div class="case">
            <h3>🔮 Секретный контейнер</h3>
            <div class="desc">Неизвестно, что внутри…</div>
            <div class="price">500 ₽</div>
            <button class="btn">Купить</button>
        </div>
        <div class="case">
            <h3>💎 Синий контейнер</h3>
            <div class="desc">Пришёл из Америки</div>
            <div class="price">300 ₽</div>
            <button class="btn">Купить</button>
        </div>
        <div class="case">
            <h3>👑 Золотой контейнер</h3>
            <div class="desc">Реликвия древних</div>
            <div class="price">1500 ₽</div>
            <button class="btn">Купить</button>
        </div>
    </div>

    <div class="nav">
        <a href="#" class="active">🏠 Главная</a>
        <a href="#">🚀 Ракетка</a>
        <a href="#">🎒 Инвентарь</a>
        <a href="#">🏆 Рейтинг</a>
    </div>

</body>
  </html>
